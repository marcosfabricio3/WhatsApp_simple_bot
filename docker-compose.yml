version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    environment:
      - NODE_ENV=development
    volumes:
      - ./packages/server:/app/packages/server
      - /app/node_modules
    working_dir: /app
    command: cd packages/server && npm run dev